server:
  port: 8090

spring:
  application:
    name: scf-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
      routes:
        - id: oms
          uri: http://localhost:8084
          predicates:
            - Path=/api/oms/**,/api/scf/**
        - id: isc
          uri: http://localhost:8081
          predicates:
            - Path=/api/isc/**
        - id: wms
          uri: http://localhost:8082
          predicates:
            - Path=/api/wms/**
        - id: lgs
          uri: http://localhost:8083
          predicates:
            - Path=/api/lgs/**
